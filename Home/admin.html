<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Pagos | Sacramento</title>
  <link rel="stylesheet" href="../Styles/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    .admin-wrap { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .admin-wrap h1 { font-family: "Playfair Display", serif; margin-bottom: 0.5rem; }
    .admin-meta { font-size: 0.85rem; color: #555; margin-bottom: 1.5rem; }
    .admin-panel { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    .admin-panel h2 { margin: 0 0 1rem; font-size: 1.1rem; }
    .admin-form label { display: block; margin-bottom: 0.35rem; font-weight: 600; }
    .admin-form input, .admin-form select { width: 100%; max-width: 320px; padding: 0.5rem 0.6rem; margin-bottom: 0.75rem; border: 1px solid #ccc; border-radius: 4px; }
    .admin-filters { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.75rem; align-items: end; }
    .admin-filters .field label { font-size: 0.85rem; }
    .admin-filters .field input, .admin-filters .field select { max-width: none; width: 100%; margin-bottom: 0; }
    .admin-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; align-items: center; }
    .admin-btn { padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid #333; background: #222; color: #fff; cursor: pointer; font-size: 0.95rem; }
    .admin-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .admin-btn.secondary { background: #fff; color: #222; }
    #status-msg { padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; }
    #status-msg[data-kind="error"] { background: #fdecea; border: 1px solid #f5c6cb; color: #721c24; }
    .admin-table-wrap { overflow-x: auto; border: 1px solid #e0e0e0; border-radius: 8px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: #fff; }
    .admin-table th, .admin-table td { padding: 0.5rem 0.6rem; text-align: left; border-bottom: 1px solid #eee; vertical-align: top; }
    .admin-table th { background: #f5f5f5; position: sticky; top: 0; }
    .admin-table .mono { font-family: ui-monospace, monospace; word-break: break-all; }
    .admin-table .url-cell { max-width: 220px; word-break: break-all; }
    .admin-empty { text-align: center; padding: 2rem !important; color: #666; }
    .admin-badge { display: inline-block; padding: 0.15rem 0.45rem; background: #eef; border-radius: 4px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <h1>Admin — Pagos</h1>
    <p class="admin-meta">API base: <strong id="api-base-display">—</strong> · <a href="index.html">Volver al sitio</a></p>

    <div id="status-msg" hidden role="alert"></div>

    <section id="view-login" class="admin-panel">
      <h2>Iniciar sesión</h2>
      <form id="login-form" class="admin-form" autocomplete="on">
        <label for="login-user">Usuario</label>
        <input id="login-user" name="username" type="text" required autocomplete="username">

        <label for="login-pass">Contraseña</label>
        <input id="login-pass" name="password" type="password" required autocomplete="current-password">

        <button type="submit" class="admin-btn" id="btn-login">Entrar</button>
      </form>
    </section>

    <section id="view-payments" class="admin-panel" hidden>
      <h2>Listado de pagos</h2>

      <div class="admin-filters">
        <div class="field">
          <label for="filter-status">Estado</label>
          <input id="filter-status" type="text" placeholder="ej. active, paid" list="status-suggestions">
          <datalist id="status-suggestions">
            <option value="active"></option>
            <option value="paid"></option>
            <option value="cancelled"></option>
          </datalist>
        </div>
        <div class="field">
          <label for="filter-experience">Experiencia</label>
          <input id="filter-experience" type="text" placeholder="contiene…">
        </div>
        <div class="field">
          <label for="filter-q">SessionId / fingerprint</label>
          <input id="filter-q" type="search" placeholder="búsqueda libre">
        </div>
        <div class="field">
          <label for="filter-from">Desde (ISO o fecha)</label>
          <input id="filter-from" type="text" placeholder="2025-04-01">
        </div>
        <div class="field">
          <label for="filter-to">Hasta (ISO o fecha)</label>
          <input id="filter-to" type="text" placeholder="2025-04-30">
        </div>
        <div class="field">
          <label for="filter-limit">Límite</label>
          <select id="filter-limit">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
            <option value="500">500</option>
          </select>
        </div>
        <div class="field">
          <label for="filter-sort">Ordenar por</label>
          <select id="filter-sort">
            <option value="updatedAt" selected>Última actualización</option>
            <option value="createdAt">Creación</option>
          </select>
        </div>
        <div class="field">
          <label for="filter-order">Dirección</label>
          <select id="filter-order">
            <option value="desc" selected>Reciente primero</option>
            <option value="asc">Antiguo primero</option>
          </select>
        </div>
      </div>

      <div class="admin-actions">
        <button type="button" class="admin-btn" id="btn-refresh">Actualizar</button>
        <button type="button" class="admin-btn secondary" id="btn-logout">Cerrar sesión</button>
        <span id="payments-meta" class="admin-meta" style="margin:0"></span>
      </div>

      <div class="admin-table-wrap" style="margin-top:1rem">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Creado</th>
              <th>Actualizado</th>
              <th>Experiencia</th>
              <th>Personas</th>
              <th>Monto</th>
              <th>Moneda</th>
              <th>Estado</th>
              <th>Session ID</th>
              <th>Payment URL</th>
            </tr>
          </thead>
          <tbody id="payments-tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
